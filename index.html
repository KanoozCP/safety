<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback & Complaints - Kanooz</title>
    
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind CSS 4 -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --kcp-indigo: #1e3a8a;
            --kcp-blue: #2563eb;
            --kcp-orange: #f97316;
            --kcp-gradient: linear-gradient(135deg, #1e3a8a, #2563eb, #f97316);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
            margin: 0;
            min-height: 100vh;
        }
        
        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; }

        @keyframes kcpGrad {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animate-kcp-gradient {
            background: var(--kcp-gradient);
            background-size: 200% 200%;
            animation: kcpGrad 6s ease infinite;
        }

        .glass-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .header-hidden {
            transform: translateY(-100%);
        }

        .glass-bg { 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.6); 
        }

        .input-style { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.5); 
            border: 1px solid #e2e8f0; 
            border-radius: 0.75rem; 
            padding: 0.75rem 1rem; 
            transition: all 0.2s; 
            font-size: 0.875rem;
        }

        .input-style:focus { 
            outline: none; 
            border-color: #2563eb; 
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); 
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { 
            width: 1.25rem; 
            height: 1.25rem; 
            border: 2px solid rgba(255,255,255,0.3); 
            border-top-color: white; 
            border-radius: 50%; 
            animation: spin 0.6s linear infinite; 
            display: none; 
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden opacity-[0.05] flex items-center justify-center">
        <img src="https://lh3.googleusercontent.com/d/1oQr4RoR9ON5vK6U_oIN2hW0HdnpEloO8" alt="Watermark" style="width: 600px; max-width: 80vw;">
    </div>

    <!-- Header -->
    <header id="mainHeader" class="glass-header">
        <div class="max-w-7xl mx-auto px-6 h-20 md:h-24 flex items-center justify-between">
            <a href="https://kanooz.com/" target="_blank" class="flex items-center gap-4 group">
                <img src="https://kanooz.com/assets/images/logo.png" alt="Kanooz Logo" class="h-10 md:h-14 transition-transform group-hover:scale-105">
            </a>

            <div class="absolute left-1/2 -translate-x-1/2">
                <div class="animate-kcp-gradient p-[1px] rounded-2xl shadow-xl">
                    <div class="bg-white/10 backdrop-blur-xl px-4 md:px-10 py-3 rounded-[15px] border border-white/20 text-center">
                        <h1 class="text-white font-extrabold text-sm md:text-xl tracking-tight uppercase whitespace-nowrap">
                            Central Planning Portal
                        </h1>
                    </div>
                </div>
            </div>

            <!-- Standalone back button indicator -->
            <div>
                <a href="https://kanoozcp.github.io/" class="inline-flex items-center gap-1.5 px-3 py-1.5 md:px-4 md:py-2 border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 hover:text-blue-600 transition-all rounded-xl text-xs md:text-sm font-bold shadow-sm">
                    <i data-lucide="home" style="width:16px;height:16px"></i>
                    <span>Back to Portal</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 max-w-3xl mx-auto px-6 py-8 sm:py-12 min-h-[calc(100vh-176px)] flex flex-col justify-center">
        <!-- Welcoming block -->
        <div class="mb-8 text-left">
            <h2 class="text-2xl sm:text-4xl font-black text-slate-900 tracking-tight">Feedback & <span class="text-blue-600">Complaints</span></h2>
            <p class="text-slate-500 font-medium text-xs sm:text-base mt-2">Project team feedback portal.</p>
        </div>

        <form id="feedbackForm" class="glass-bg p-5 sm:p-10 rounded-3xl shadow-xl space-y-5 sm:space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 sm:gap-6">
                <div class="space-y-1.5 sm:space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block pl-1">Full Name</label>
                    <input type="text" name="name" required class="input-style" placeholder="Enter name">
                </div>
                <div class="space-y-1.5 sm:space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block pl-1">Badge No</label>
                    <input type="text" name="badgeNo" required class="input-style" placeholder="2XXX, 3XXX, GH-XXX, QV-XXXX etc. ">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 sm:gap-6">
                <div class="space-y-1.5 sm:space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block pl-1">Designation</label>
                    <input type="text" name="designation" required class="input-style" placeholder="Position">
                </div>
                <div class="space-y-1.5 sm:space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block pl-1">Project Name</label>
                    <input type="text" name="projectName" required class="input-style" placeholder="Project name">
                </div>
            </div>

            <div class="space-y-1.5 sm:space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block pl-1">Cost Center</label>
                <input type="text" name="costCenter" required class="input-style" placeholder="KNZXX-XXXXXX">
            </div>

            <div class="space-y-1.5 sm:space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block pl-1">Contact Mobile / Email</label>
                <input type="text" name="contact" required class="input-style" placeholder="Mobile no or Email ID">
            </div>

            <div class="space-y-1.5 sm:space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block pl-1">Feedback & Complaints</label>
                <textarea name="feedback" required rows="5" class="input-style" placeholder="Describe the issue or feedback..."></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-black uppercase tracking-widest py-3 sm:py-4 rounded-xl flex items-center justify-center gap-3 hover:bg-blue-600 transition-all active:scale-[0.98] shadow-lg">
                <span id="btnText">Submit Feedback</span>
                <div id="btnSpinner" class="spinner"></div>
            </button>
            <p id="successMsg" class="text-emerald-600 text-center font-bold text-sm hidden">✓ Feedback logged with Date & Time!</p>
            <p id="errorMsg" class="text-red-500 text-center font-bold text-xs hidden">✕ Submission failed. Please try again.</p>
        </form>
    </main>

    <!-- Footer same as previous page -->
    <footer class="mt-12 border-t border-slate-200/60 bg-white/30 backdrop-blur-3xl relative z-10 w-full">
        <div class="max-w-7xl mx-auto px-6 py-4 md:py-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                
                <!-- Contact Icons Row -->
                <div class="flex flex-wrap items-center justify-center md:justify-start gap-x-6 gap-y-3">
                    <div class="flex items-center gap-2 group cursor-default">
                        <i data-lucide="map-pin" class="w-3.5 h-3.5 text-slate-400"></i>
                        <span class="text-slate-600 font-medium text-[11px]">Dammam, KSA</span>
                    </div>

                    <a href="mailto:Info@kanooz.com" class="flex items-center gap-2 group">
                        <i data-lucide="mail" class="w-3.5 h-3.5 text-blue-500"></i>
                        <span class="text-slate-600 font-medium text-[11px] group-hover:text-blue-600 transition-colors">Info@kanooz.com</span>
                    </a>

                    <a href="tel:+96692000043" class="flex items-center gap-2 group">
                        <i data-lucide="phone" class="w-3.5 h-3.5 text-emerald-500"></i>
                        <span class="text-slate-600 font-medium text-[11px] group-hover:text-emerald-600 transition-colors">+966 92000043</span>
                    </a>
                </div>

                <!-- Copyright & Logo -->
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3">
                        <p class="text-slate-400 text-[10px] font-medium select-none">
                            © 2026 Kanooz Central Planning.
                        </p>
                        <span class="text-[8px] font-bold text-slate-300 uppercase tracking-[0.2em] px-2 py-0.5 border border-slate-200 rounded-full select-none">
                            v1.0.0
                        </span>
                    </div>
                    <a href="https://kanooz-central-planning-35103598616.asia-south1.run.app/" target="_blank" rel="noopener noreferrer" class="inline-block">
                        <img src="https://kanooz.com/assets/images/logo.png" alt="Kanooz" class="h-8 opacity-40 grayscale hover:grayscale-0 transition-opacity">
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        lucide.createIcons();
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxHJQaHUcl51hAxo3_xIVpXd4Lf6siqoak7uQCgbiuhSN4dyyq8UucyUjfvrkyb5-w3EA/exec';

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('btnSpinner');
            const btnText = document.getElementById('btnText');
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');

            const formData = {
                name: e.target.name.value,
                badgeNo: e.target.badgeNo.value,
                designation: e.target.designation.value,
                projectName: e.target.projectName.value,
                costCenter: e.target.costCenter.value,
                feedback: e.target.feedback.value,
                contact: e.target.contact.value
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(formData)
                });
                
                successMsg.classList.remove('hidden');
                e.target.reset();
                setTimeout(() => { 
                    window.location.href = 'https://kanoozcp.github.io/';
                }, 3000);
            } catch (err) {
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        });

        // Header scroll effect
        let lastScroll = 0;
        const header = document.getElementById('mainHeader');

        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            if (currentScroll <= 0) {
                header.classList.remove('header-hidden');
                return;
            }

            if (currentScroll > lastScroll && !header.classList.contains('header-hidden')) {
                // Scroll down
                header.classList.add('header-hidden');
            } else if (currentScroll < lastScroll && header.classList.contains('header-hidden')) {
                // Scroll up
                header.classList.remove('header-hidden');
            }
            lastScroll = currentScroll;
        });
    </script>
</body>
</html>
